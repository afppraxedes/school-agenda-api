# ========================
# LOGGING CONFIG
# ========================
logging.level.com.schoolagenda=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# ========================
# SPRING DOC (Development)
# ========================
springdoc.openapi.title= GDE API
springdoc.openapi.description= Component responsable for user management create on GDE
springdoc.openapi.version= 1.0.0

# ========================
# CORS CONFIG (Development)
# ========================
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000,https://*.ngrok-free.dev
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# ========================
# UTF-8 Configuration
# ========================
# Configurações de Encoding
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
spring.web.locale=pt-BR
spring.web.locale-resolver=fixed

# Server encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8

# JPA encoding
spring.jpa.properties.hibernate.connection.characterEncoding=utf-8
spring.jpa.properties.hibernate.connection.CharSet=utf-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# Jackson (JSON) encoding
spring.jackson.encoding.charset=UTF-8
spring.jackson.default-property-inclusion=non_null


